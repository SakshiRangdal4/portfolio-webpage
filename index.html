<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakshi Portfolio</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .portfolio {
            margin: auto;
            width: 90%;
            max-width: 900px;
            border-radius: 20px;
            overflow: hidden;
            background: white;
        }

        .header {
            background: skyblue;
            padding: 40px;
        }

        nav {
            display: flex;
            justify-content: space-between;
        }

        .herosection {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .herosection img {
            border-radius: 50%;
            height: 180px;
            border: 5px solid white;
        }

        button {
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            background: white;
            cursor: pointer;
        }

        button:hover {
            background: black;
            color: white;
        }

        .content {
            padding: 40px;
        }

        .skills-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .skill {
            padding: 15px;
            border-radius: 20px;
            color: white;
            width: 100px;
            text-align: center;
        }
        .profile-img {
            border-radius: 50%;
            height: 180px;
            width: 180px;
            object-fit: cover;
            border: 5px solid white;
        }

        .blue { background: skyblue; }
        .orange { background: purple; }
        .yellow { background: grey; }

        .contact div {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
    </style>
</head>

<body>

<div class="portfolio">

    <div class="header">
        <nav>
            <h1>My Portfolio</h1>   
            <div>
                <span>Home</span>
                <span>About</span>
                <span>Skills</span>
                <span>Contact</span>
            </div>
        </nav>

        <div class="herosection">
            <div>
                <h1>Hello, I'm Sakshi!</h1>
                <p>I am a web developer</p>
                <button>Download Resume</button>
            </div>

           <img src="C:\Users\saksh\OneDrive\Desktop\internship.html\profile.jpg.jpg" alt="Profile" class="profile-img">
        </div>
    </div>

    <div class="content">
        <section>
            <h1>About Me</h1>
            <p>I am a web developer learner.</p>
        </section>

        <section>
            <h2>Skills</h2>
            <div class="skills-container">
                <span class="skill blue">HTML</span>
                <span class="skill yellow">CSS</span>
                <span class="skill orange">JS</span>
            </div>
        </section>

        <section class="contact">
            <h2>Contact</h2>
            <div>
                <span>Email: sakshi@gmail.com</span>
                <span>Location: Bidar, India</span>
                <span>Phone: 9380368531</span>
            </div>
        </section>
    </div>

</div>

</body>
</html>
